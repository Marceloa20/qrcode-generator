<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QRCode</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <main class="container">
        <h1>Gere seu QRCode aqui</h1>

        <textarea maxlength="256" rows="5" class="textarea" id="textarea" placeholder="Cole sua URL aqui..."></textarea>
        <span id="messageError" class="error"></span>

        <button id="btn-generate" class="button">Gerar QRCode</button>

        <div class="containerQRCode">
            <img id="qrCodeImage" class="qrCode">
        </div>
    </main>
    <footer class="footer">&copy; Desenvolvido por Marcelo Avinte</footer>


    <script src="assets/js/script.js"></script>
</body>
</html>
